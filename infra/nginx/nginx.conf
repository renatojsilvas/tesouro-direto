worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Blazor Web
        location / {
            proxy_pass http://tesouro-direto-web:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # API
        location /api/ {
            proxy_pass http://tesouro-direto-app:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Grafana (serve_from_sub_path espera receber /grafana/)
        location /grafana/ {
            proxy_pass http://tesouro-direto-grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        # Prometheus (web.external-url espera receber /prometheus/)
        location /prometheus/ {
            proxy_pass http://tesouro-direto-prometheus:9090;
            proxy_set_header Host $host;
        }

        # SonarQube (SONAR_WEB_CONTEXT espera receber /sonar/)
        location /sonar/ {
            proxy_pass http://tesouro-direto-sonar:9000;
            proxy_set_header Host $host;
        }
    }
}
