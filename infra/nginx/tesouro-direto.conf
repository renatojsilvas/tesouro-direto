# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=web:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 3080;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Limit request body size
    client_max_body_size 10m;

    # Blazor Web
    location / {
        limit_req zone=web burst=20 nodelay;
        proxy_pass http://127.0.0.1:5275;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # API
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Grafana — restrict to localhost only
    location /grafana/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # Prometheus — restrict to localhost only
    location /prometheus/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
    }

    # Block common attack paths
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    location ~* /(\.git|\.env|wp-admin|wp-login|phpmyadmin) {
        return 444;
    }
}
