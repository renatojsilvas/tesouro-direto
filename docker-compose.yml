services:
  app:
    build: .
    container_name: tesouro-direto-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=tesouro_direto;Username=app;Password=${DB_PASSWORD:-app123}
      - ASPNETCORE_ENVIRONMENT=Production
      - Serilog__WriteTo__1__Args__uri=http://loki:3100
      - ApiKey__Key=${API_KEY:-dev-local-key}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: postgres:16-alpine
    container_name: tesouro-direto-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tesouro_direto
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app123}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d tesouro_direto"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: tesouro-direto-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:5275:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8081
      - ApiSettings__BaseUrl=http://app:8080
      - ApiSettings__ApiKey=${API_KEY:-dev-local-key}
    depends_on:
      app:
        condition: service_healthy

  # Observabilidade
  grafana:
    image: grafana/grafana:latest
    container_name: tesouro-direto-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:latest
    container_name: tesouro-direto-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  prometheus:
    image: prom/prometheus:latest
    container_name: tesouro-direto-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=/prometheus/'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  pgdata:
  grafana-data:
  loki-data:

networks:
  default:
    name: tesouro-net
