name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tesouro_direto_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start E2E environment
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for API..."
          timeout 120 bash -c 'until curl -sf http://localhost:5000/health; do sleep 2; done'
          echo ""
          echo "Waiting for Web..."
          timeout 120 bash -c 'until curl -sf http://localhost:5275/; do sleep 2; done'
          echo ""
          echo "All services healthy."

      - name: Seed test data
        run: |
          docker exec tesouro-direto-e2e-db psql -U app -d tesouro_direto_e2e -f /seed.sql
          echo "Seed complete."

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: tests/TesouroDireto.E2E.Tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: tests/TesouroDireto.E2E.Tests
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/TesouroDireto.E2E.Tests/test-results/
          retention-days: 7

      - name: Tear down E2E environment
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  deploy:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/tesouro-direto
            printf 'DB_PASSWORD=%s\nAPI_KEY=%s\nGRAFANA_PASSWORD=%s\nGRAFANA_ROOT_URL=%s\n' \
              '${{ secrets.DB_PASSWORD }}' \
              '${{ secrets.API_KEY }}' \
              '${{ secrets.GRAFANA_PASSWORD }}' \
              '${{ secrets.GRAFANA_ROOT_URL }}' \
              > /opt/tesouro-direto/.env
            chmod 600 /opt/tesouro-direto/.env
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/tesouro-direto
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull origin main
            fi
            cp infra/nginx/tesouro-direto.conf /etc/nginx/sites-enabled/tesouro-direto
            nginx -t && systemctl reload nginx
            docker compose build --no-cache
            docker compose up -d
            echo "Waiting for app to be healthy..."
            timeout 60 bash -c 'until curl -sf http://localhost:5000/health; do sleep 3; done'
            echo "Deploy complete."
            docker image prune -f
